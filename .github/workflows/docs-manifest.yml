name: Docs manifest sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/generate-system-manifest.py"
      - "scripts/docs-update.ps1"
      - "scripts/md-to-technical-html.py"
      - "ecosystem.config.js"
      - "docs/TROPTIONS_IOU_ISSUER_MANIFEST.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install markdown

      - name: Regenerate manifest and HTML
        run: npm run docs:update

      - name: Commit doc changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No doc changes to commit"
          else
            git commit -m "chore(docs): auto-sync system manifest and technical HTML"
            git push
          fi
