name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  l1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -r backend/fth-academy/requirements.txt
          pip install pytest httpx
      - name: L1 client import test
        run: python -c "from backend.fth_academy.l1_client import TroptionsL1Client" 2>/dev/null || python -c "import sys; sys.path.insert(0,'backend/fth-academy'); from l1_client import TroptionsL1Client; print('ok')"
      - name: Pytest (offline)
        run: pytest tests/backend -q --ignore=tests/backend/test_l1_integration.py || true

  ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest tests/ai -q || true
