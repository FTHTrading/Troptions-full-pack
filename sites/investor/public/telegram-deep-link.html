<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open NeedAI Ada — Telegram</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0e14; color: #e8eaed; margin: 2rem; }
    a { color: #3d7ea6; }
    code { color: #c9a227; }
  </style>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var u = params.get("u") || "NeedAI_Ada_bot";
      if (u) {
        location.replace("https://t.me/" + u.replace(/^@/, ""));
      }
    })();
  </script>
</head>
<body>
  <h1>NeedAI Ada — Telegram</h1>
  <p>
    Default: <a href="https://t.me/NeedAI_Ada_bot">@NeedAI_Ada_bot</a>.
    Override with <code>?u=BotUsername</code> or set
    <code>NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=NeedAI_Ada_bot</code> at build.
  </p>
  <p><a href="./telegram/">Telegram setup page</a> · <a href="./command-center/">Command Center</a></p>
</body>
</html>
