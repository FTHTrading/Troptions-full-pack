name: CI Policy Gates

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main", "master"]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Policy gates
        run: npm run policy:gates

      - name: Environment validation (CI profile)
        run: npm run validate:env
        env:
          NODE_ENV: test
          TROPTIONS_JWT_SECRET: ci_ci_ci_ci_ci_ci_ci_ci_ci_ci_ci_ci
          TROPTIONS_AUDIT_EXPORT_SECRET: ci_audit_ci_audit_ci_audit_ci_audit
          TROPTIONS_AUDIT_EXPORT_KEY_ID: ci-kid-1

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
