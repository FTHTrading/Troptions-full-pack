name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Policy gates
        run: npm run policy:gates --if-present

      - name: Environment validation
        run: npm run validate:env --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test -- --runInBand

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
