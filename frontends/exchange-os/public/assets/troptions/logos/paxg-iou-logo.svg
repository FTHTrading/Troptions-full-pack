<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-paxg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0E00"/>
      <stop offset="100%" stop-color="#1A1800"/>
    </linearGradient>
    <linearGradient id="paxgGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9C7C00"/>
    </linearGradient>
    <filter id="shadow-paxg">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#D4AF37" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg-paxg)"/>
  <circle cx="100" cy="88" r="66" fill="none" stroke="url(#paxgGold)" stroke-width="2" opacity="0.5"/>
  <!-- Hexagon gold shape -->
  <polygon points="100,38 138,60 138,104 100,126 62,104 62,60"
           fill="url(#paxgGold)" filter="url(#shadow-paxg)"/>
  <!-- Inner hexagon -->
  <polygon points="100,52 126,67 126,97 100,112 74,97 74,67"
           fill="#0D0E00" opacity="0.5"/>
  <!-- Au symbol for gold -->
  <text x="100" y="90" font-family="Georgia, serif" font-size="28" font-weight="900"
        fill="#F5E060" text-anchor="middle" dominant-baseline="middle">Au</text>
  <text x="100" y="107" font-family="'Arial Black', Arial, sans-serif" font-size="10" font-weight="900"
        fill="#F5E060" text-anchor="middle" letter-spacing="2">PAXG</text>
  <rect x="56" y="142" width="88" height="20" rx="10" fill="#9C7C00"/>
  <text x="100" y="156" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#F5E060" text-anchor="middle" letter-spacing="2">GOLD · IOU</text>
  <text x="100" y="183" font-family="Arial, sans-serif" font-size="7.5" font-weight="600"
        fill="#8A7A30" text-anchor="middle" letter-spacing="1.5">TROPTIONS GATEWAY</text>
</svg>
