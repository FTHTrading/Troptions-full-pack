<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-usdt" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D2218"/>
      <stop offset="100%" stop-color="#071A10"/>
    </radialGradient>
    <radialGradient id="coin-usdt" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3DB88A"/>
      <stop offset="100%" stop-color="#26A17B"/>
    </radialGradient>
    <filter id="shadow-usdt">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#26A17B" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg-usdt)"/>

  <!-- Outer glow ring -->
  <circle cx="100" cy="95" r="66" fill="none" stroke="#26A17B" stroke-width="2" opacity="0.4"/>

  <!-- Coin body -->
  <circle cx="100" cy="95" r="60" fill="url(#coin-usdt)" filter="url(#shadow-usdt)"/>

  <!-- Inner ring -->
  <circle cx="100" cy="95" r="52" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>

  <!-- Tether T symbol -->
  <!-- Horizontal bar at top -->
  <rect x="70" y="62" width="60" height="10" rx="5" fill="white" opacity="0.95"/>
  <!-- Vertical stem -->
  <rect x="94" y="72" width="12" height="45" rx="6" fill="white" opacity="0.95"/>
  <!-- Underline accent -->
  <rect x="75" y="120" width="50" height="4" rx="2" fill="white" opacity="0.5"/>

  <!-- "USDT" label -->
  <text x="100" y="115" font-family="'Arial Black', Arial, sans-serif" font-size="0"
        fill="white" text-anchor="middle">.</text>

  <!-- IOU badge -->
  <rect x="66" y="142" width="68" height="20" rx="10" fill="#26A17B"/>
  <text x="100" y="156" font-family="Arial, sans-serif" font-size="10" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="2">IOU</text>

  <!-- USDT ticker below coin area -->
  <text x="100" y="137" font-family="'Arial Black', Arial, sans-serif" font-size="11"
        font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">USDT</text>

  <!-- Footer -->
  <text x="100" y="183" font-family="Arial, sans-serif" font-size="7.5" font-weight="600"
        fill="#5A9C7A" text-anchor="middle" letter-spacing="1.5">TROPTIONS GATEWAY</text>
</svg>
