<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Deep sovereign dark background -->
    <radialGradient id="bg-troptions" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1A1508"/>
      <stop offset="60%" stop-color="#0D0C07"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>

    <!-- Gold coin gradient -->
    <radialGradient id="coin-troptions" cx="38%" cy="32%" r="62%">
      <stop offset="0%"  stop-color="#F0D070"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8A6A1A"/>
    </radialGradient>

    <!-- Inner face gradient -->
    <radialGradient id="face-troptions" cx="42%" cy="38%" r="55%">
      <stop offset="0%"  stop-color="#EED060"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </radialGradient>

    <!-- Amber glow ring -->
    <radialGradient id="glow-troptions" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for coin depth -->
    <filter id="shadow-t" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#C9A84C" flood-opacity="0.45"/>
    </filter>

    <!-- Soft glow filter for text -->
    <filter id="glow-text" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for hexagonal background accent -->
    <clipPath id="clip-hex">
      <polygon points="100,14 174,55 174,137 100,178 26,137 26,55"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="22" fill="url(#bg-troptions)"/>

  <!-- Subtle hexagonal glow layer -->
  <ellipse cx="100" cy="93" rx="78" ry="72" fill="url(#glow-troptions)"/>

  <!-- Outer decorative ring (amber, faint) -->
  <circle cx="100" cy="93" r="72" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="4 5" opacity="0.28"/>

  <!-- Middle ring -->
  <circle cx="100" cy="93" r="67" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.15"/>

  <!-- Coin body -->
  <circle cx="100" cy="93" r="61" fill="url(#coin-troptions)" filter="url(#shadow-t)"/>

  <!-- Coin bevel edge -->
  <circle cx="100" cy="93" r="61" fill="none" stroke="#F5E090" stroke-width="1.8" opacity="0.5"/>

  <!-- Inner coin face -->
  <circle cx="100" cy="93" r="54" fill="url(#face-troptions)"/>

  <!-- Inner recess ring -->
  <circle cx="100" cy="93" r="54" fill="none" stroke="#7A5A10" stroke-width="1" opacity="0.5"/>

  <!-- Subtle hex pattern lines on coin face -->
  <polygon points="100,47 134,67 134,107 100,127 66,107 66,67"
           fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.14"/>
  <polygon points="100,55 126,70 126,100 100,115 74,100 74,70"
           fill="none" stroke="#FFFFFF" stroke-width="0.4" opacity="0.10"/>

  <!-- "T" Monogram — serif bold, white -->
  <text
    x="100" y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="66"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.95"
    filter="url(#glow-text)"
  >T</text>

  <!-- "TROPTIONS" label below coin -->
  <text
    x="100" y="130"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="9.5"
    font-weight="900"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="2.8"
    opacity="0.92"
  >TROPTIONS</text>

  <!-- IOU badge — amber pill -->
  <rect x="67" y="143" width="66" height="19" rx="9.5" fill="#C9A84C"/>
  <rect x="68" y="144" width="64" height="17" rx="8.5" fill="none" stroke="#F5E090" stroke-width="0.8" opacity="0.6"/>
  <text
    x="100" y="156"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="9"
    font-weight="900"
    fill="#0A0A0A"
    text-anchor="middle"
    letter-spacing="3.5"
  >IOU</text>

  <!-- Verified dot accents on IOU badge -->
  <circle cx="74" cy="152.5" r="2.2" fill="#8A6A1A" opacity="0.5"/>
  <circle cx="126" cy="152.5" r="2.2" fill="#8A6A1A" opacity="0.5"/>

  <!-- Footer label -->
  <text
    x="100" y="182"
    font-family="Arial, sans-serif"
    font-size="6.8"
    font-weight="600"
    fill="#7A6630"
    text-anchor="middle"
    letter-spacing="1.8"
  >TROPTIONS GATEWAY</text>

  <!-- Corner seal dots -->
  <circle cx="18" cy="18" r="2" fill="#C9A84C" opacity="0.25"/>
  <circle cx="182" cy="18" r="2" fill="#C9A84C" opacity="0.25"/>
  <circle cx="18" cy="182" r="2" fill="#C9A84C" opacity="0.25"/>
  <circle cx="182" cy="182" r="2" fill="#C9A84C" opacity="0.25"/>
</svg>
