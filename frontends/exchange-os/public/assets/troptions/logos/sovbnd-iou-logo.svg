<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="navySov" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06140F"/>
      <stop offset="100%" stop-color="#0A1E14"/>
    </linearGradient>
    <linearGradient id="bondGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF62"/>
      <stop offset="50%" stop-color="#B8922A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="shadow-sovbnd">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#B8922A" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#navySov)"/>
  <circle cx="100" cy="88" r="66" fill="none" stroke="url(#bondGold)" stroke-width="2" opacity="0.5"/>
  <!-- Bond certificate shape -->
  <rect x="58" y="55" width="84" height="66" rx="6" fill="none" stroke="url(#bondGold)" stroke-width="2.5" filter="url(#shadow-sovbnd)"/>
  <rect x="63" y="60" width="74" height="56" rx="4" fill="#0D1E14"/>
  <!-- Decorative lines -->
  <line x1="70" y1="72" x2="130" y2="72" stroke="#D4AF62" stroke-width="1" opacity="0.6"/>
  <line x1="70" y1="79" x2="130" y2="79" stroke="#D4AF62" stroke-width="0.7" opacity="0.3"/>
  <!-- SOV text -->
  <text x="100" y="96" font-family="Georgia, serif" font-size="16" font-weight="700"
        fill="#D4AF62" text-anchor="middle" letter-spacing="3">SOVEREIGN</text>
  <text x="100" y="110" font-family="Georgia, serif" font-size="11" font-weight="600"
        fill="#B8922A" text-anchor="middle" letter-spacing="2">BOND RECEIPT</text>
  <!-- Seal -->
  <circle cx="100" cy="136" r="14" fill="none" stroke="#D4AF62" stroke-width="1.5" opacity="0.6"/>
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="9" font-weight="900"
        fill="#D4AF62" text-anchor="middle">SOV</text>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="7.5" font-weight="600"
        fill="#6A8060" text-anchor="middle" letter-spacing="1.5">TROPTIONS GATEWAY</text>
</svg>
