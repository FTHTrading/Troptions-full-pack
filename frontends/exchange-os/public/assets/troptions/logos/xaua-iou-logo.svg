<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071426;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b1f36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0cf82;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c99a3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8792a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0cf82;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#c99a3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#navyGrad)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="88" r="54" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7"/>
  <!-- Gold ingot body -->
  <rect x="65" y="67" width="70" height="42" rx="6" fill="url(#goldShine)"/>
  <!-- Ingot shine top highlight -->
  <rect x="65" y="67" width="70" height="10" rx="6" fill="#f0cf82" opacity="0.5"/>
  <!-- Ingot edge lines -->
  <line x1="65" y1="80" x2="135" y2="80" stroke="#a8792a" stroke-width="1" opacity="0.5"/>
  <!-- XAU text on ingot -->
  <text x="100" y="96" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#071426" text-anchor="middle" letter-spacing="3">XAU</text>
  <!-- IOU badge -->
  <rect x="66" y="143" width="68" height="20" rx="10" fill="url(#goldGrad)" opacity="0.2"/>
  <text x="100" y="157.5" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#f0cf82" text-anchor="middle" letter-spacing="2">IOU · A</text>
  <!-- Bottom label -->
  <text x="100" y="185" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" fill="#8a94a6" text-anchor="middle" letter-spacing="1.5">TROPTIONS GATEWAY</text>
</svg>
