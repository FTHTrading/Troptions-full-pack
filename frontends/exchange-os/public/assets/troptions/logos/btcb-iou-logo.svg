<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071426;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b1f36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c99a3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0cf82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c99a3c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#navyGrad)"/>
  <!-- Outer gold ring (dashed = tranche B) -->
  <circle cx="100" cy="88" r="54" fill="none" stroke="url(#goldRing)" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.6"/>
  <!-- Bitcoin circle fill -->
  <circle cx="100" cy="88" r="46" fill="url(#orangeGrad)" opacity="0.12"/>
  <!-- Bitcoin B symbol -->
  <text x="100" y="106" font-family="Georgia, serif" font-size="62" font-weight="900" fill="url(#orangeGrad)" text-anchor="middle" dominant-baseline="auto">₿</text>
  <!-- IOU badge -->
  <rect x="66" y="143" width="68" height="20" rx="10" fill="url(#goldRing)" opacity="0.18"/>
  <text x="100" y="157.5" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#f0cf82" text-anchor="middle" letter-spacing="2">IOU · B</text>
  <!-- Bottom label -->
  <text x="100" y="185" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" fill="#8a94a6" text-anchor="middle" letter-spacing="1.5">TROPTIONS GATEWAY</text>
</svg>
