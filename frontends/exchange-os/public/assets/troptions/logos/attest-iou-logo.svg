<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-attest" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E0A2A"/>
      <stop offset="100%" stop-color="#070518"/>
    </radialGradient>
    <radialGradient id="coin-attest" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7C5CBF"/>
      <stop offset="100%" stop-color="#4A2A8F"/>
    </radialGradient>
    <filter id="shadow-attest">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4A2A8F" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg-attest)"/>
  <circle cx="100" cy="90" r="66" fill="none" stroke="#5A3AAF" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="90" r="58" fill="url(#coin-attest)" filter="url(#shadow-attest)"/>
  <!-- Hash / blockchain icon -->
  <line x1="83" y1="70" x2="83" y2="110" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="117" y1="70" x2="117" y2="110" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="74" y1="80" x2="126" y2="80" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="74" y1="100" x2="126" y2="100" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Check mark overlay -->
  <circle cx="116" cy="68" r="10" fill="#6AE670"/>
  <polyline points="110,68 114,73 122,63" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="58" y="140" width="84" height="20" rx="10" fill="#4A2A8F"/>
  <text x="100" y="154" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#C0A0FF" text-anchor="middle" letter-spacing="2">ATTESTATION</text>
  <text x="100" y="183" font-family="Arial, sans-serif" font-size="7.5" font-weight="600"
        fill="#7A6AAD" text-anchor="middle" letter-spacing="1.5">TROPTIONS GATEWAY</text>
</svg>
