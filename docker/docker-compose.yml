services:
  l1:
    image: rust:1-bookworm
    working_dir: /app/l1
    volumes:
      - ../l1:/app/l1
    command: ["cargo", "run", "-p", "node", "--", "9944"]
    ports:
      - "9944:9944"
    profiles: ["full", "l1"]

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles: ["full", "ai"]

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles: ["full", "ai"]

  donk-tutor:
    build:
      context: ../ai/donk-tutor
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      OLLAMA_URL: http://ollama:11434
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      - ollama
      - qdrant
    profiles: ["full", "backend"]

  fth-academy:
    build:
      context: ../backend/fth-academy
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      L1_RPC_URL: http://l1:9944
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - l1
      - ollama
    profiles: ["full", "backend"]

  ttn-launcher:
    build:
      context: ../backend/ttn-launcher
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    profiles: ["full", "backend"]

volumes:
  ollama_data:
  qdrant_data:
