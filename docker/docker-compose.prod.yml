services:
  l1:
    build:
      context: ../l1
      dockerfile: Dockerfile
    command: ["troptions-node", "9944", "/data/l1-rocksdb"]
    ports:
      - "9944:9944"
      - "9945:9945"
    environment:
      L1_METRICS_PORT: "9945"
      RUST_LOG: info
    volumes:
      - l1_rocksdb:/data/l1-rocksdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9944"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  donk-tutor:
    build:
      context: ../ai/donk-tutor
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      OLLAMA_URL: http://ollama:11434
      QDRANT_HOST: qdrant
    depends_on:
      - ollama
      - qdrant
    restart: unless-stopped

  fth-academy:
    build:
      context: ..
      dockerfile: backend/fth-academy/Dockerfile
    ports:
      - "8091:8091"
    environment:
      L1_RPC_URL: http://l1:9944
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - l1
    restart: unless-stopped

  ttn-launcher:
    build:
      context: ../backend/ttn-launcher
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    restart: unless-stopped

  dao-service:
    build:
      context: ..
      dockerfile: backend/dao-service/Dockerfile
    ports:
      - "8093:8093"
    environment:
      L1_RPC_URL: http://l1:9944
      DAO_PORT: "8093"
      SETTLEMENT_API_KEYS: ${SETTLEMENT_API_KEYS:-}
      L1_PUBLIC_KEY: ${L1_PUBLIC_KEY:-}
    volumes:
      - dao_sqlite:/app/dao/data
    depends_on:
      - l1
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infrastructure/nginx/sites:/etc/nginx/conf.d:ro
    depends_on:
      - fth-academy
      - donk-tutor
      - ttn-launcher
      - dao-service
      - l1
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  l1_rocksdb:
  dao_sqlite:
