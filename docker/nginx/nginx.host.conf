worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Backends on Windows/macOS host (PM2) — Docker Desktop host.docker.internal
    upstream l1_backend { server host.docker.internal:9944; }
    upstream ai_backend { server host.docker.internal:8090; }
    upstream fth_backend { server host.docker.internal:8091; }
    upstream ttn_backend { server host.docker.internal:8092; }
    upstream dao_backend { server host.docker.internal:8093; }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","tls":true,"mode":"host-gateway"}\n';
        }

        location /l1/ {
            proxy_pass http://l1_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /ai/ {
            proxy_pass http://ai_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /fth/ {
            proxy_pass http://fth_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /ttn/ {
            proxy_pass http://ttn_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /dao/ {
            proxy_pass http://dao_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
