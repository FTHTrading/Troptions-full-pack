title: TROPTIONS
description: >-
  TROPTIONS sovereign stack — L1 ledger, education and broadcast backends,
  DAO and exchange frontends, and honest proof labels for the full-pack monorepo.
logo: /assets/images/troptions-logo-primary.png
baseurl: "/Troptions-full-pack"
url: "https://fthtrading.github.io"
theme: minima
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

minima:
  skin: auto
  social_links:
    - platform: github
      user_url: "https://github.com/fthtrading/Troptions-full-pack"

header_pages:
  - index.md
  - guide/audio-tour.md
  - infrastructure/l1.md
  - infrastructure/backends.md
  - infrastructure/frontends.md
  - proof/truth-labels.md
  - deploy/quickstart.md
  - ROADMAP.md

exclude:
  - counterparty
  - investor
  - email-bryan-to-bijan-draft.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
