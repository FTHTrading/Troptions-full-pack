# NOT DEPLOYED until DNS A/AAAA points at this host and TLS (certbot) is complete.
# See docs/DOMAIN_TRUTH_TABLE.md — Bryan does not currently run ai/ttn.troptions.org.
# Live public surfaces today: troptions.unykorn.org, troptionslive.unykorn.org, launch.unykorn.org, fthedu.unykorn.org

upstream fth_backend { server fth-academy:8091; }
upstream donk_backend { server donk-tutor:8090; }
upstream ttn_backend { server ttn-launcher:8092; }
upstream dao_backend { server dao-service:8093; }

server {
    listen 80;
    server_name fthedu.unykorn.org;  # LIVE on unykorn when DNS pointed to this stack
    location / { proxy_pass http://fth_backend; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name ai.troptions.org;  # Future DNS — DONK; not resolving until ops cutover
    location / { proxy_pass http://donk_backend; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name ttn.troptions.org;  # Future DNS — use troptionslive.unykorn.org until then
    location / { proxy_pass http://ttn_backend; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name dao.troptions.org;  # Future DNS — dao-service edge
    location / {
        proxy_pass http://dao_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
